                    this.innerHTML = '🔇<span class="tooltiptext">Sound Off</span>';
                    
                    // Stop any playing sounds

                <div class="name-input-modal">
                    <div class="name-input-box">
    <h2 style="color: #222; font-size: 28px; font-weight: 600; text-align: center; margin-bottom: 25px; letter-spacing: 0.5px;">
            Enter Your Name
            </h2>
                        <input type="text" id="player-name-input" class="name-input" 
                               placeholder="Enter your name" maxlength="20" autofocus>
                        <button id="submit-name" style="
                            background: var(--primary-color);
                            color: white;
                            border: none;
                            padding: 12px 30px;
                            border-radius: 8px;
                            font-size: 16px;
                            cursor: pointer;
                            margin-top: 10px;
                            font-weight: 600;
                        ">Submit Name</button>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            
            const nameInput = document.getElementById('player-name-input');
            const submitBtn = document.getElementById('submit-name');
            
            nameInput.focus();
            
            // Enter key to submit
            nameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitName();
                }
            });
            
            submitBtn.addEventListener('click', submitName);
            
            function submitName() {
                const name = nameInput.value.trim();
                if (name) {
                    playerName = name;
                    document.querySelector('.name-input-modal').remove();
                    startGameAfterName();
                } else {
                    nameInput.style.borderColor = 'var(--player2-color)';
                    setTimeout(() => {
                        nameInput.style.borderColor = 'var(--player1-color)';
                    }, 500);
                }
            }
        }

        function startGameAfterName() {
            gameStatus.textContent = `${playerName}, click "Your Player" to begin`;
            startBtn.style.display = 'none';
            yourPlayerBtn.style.display = 'inline-block';
            gameStarted = true;
            saveGameState();
        }

        // Load game state from localStorage
        function loadGameState() {
            const savedGame = localStorage.getItem('gridColoringGame');
            if (savedGame) {
                const gameState = JSON.parse(savedGame);
                
                if (confirm('Would you like to continue where you left off? Ok or Cancel')) {
                    numbers = gameState.numbers;
                    markedCells = gameState.markedCells;
                    score = gameState.score;
                    playerName = gameState.playerName || "Player";
                    completedLines = gameState.completedLines || [];
                    gameStarted = gameState.gameStarted;
                    gameActive = gameState.gameActive;
                    currentPlayer = gameState.currentPlayer;
                    yourPlayer = gameState.yourPlayer;
                    startTime = gameState.startTime ? new Date(gameState.startTime) : null;
                    gameId = gameState.gameId || Date.now().toString();
                    gameWon = gameState.gameWon || false;
                    
                    renderGrid();
                    updateScore();
                    
                    if (gameStarted) {
                        startBtn.style.display = 'none';
                        if (!gameActive) {
                            yourPlayerBtn.style.display = 'inline-block';
                            gameStatus.textContent = `${playerName}, click "Your Player" to begin`;
                        } else {
                            yourPlayerBtn.style.display = 'none';
                            dragEnabled = false;
                            updateTurnDisplay();
                            startTimer();
                        }
                    }
                    
                    return true;
                }
            }
            return false;
        }

        // Save game state to localStorage
        function saveGameState() {
            const gameState = {
                numbers: Array.from(grid.children).map(cell => parseInt(cell.textContent)),
                markedCells: markedCells,
                score: score,
                playerName: playerName,
                completedLines: completedLines,
                gameStarted: gameStarted,
                gameActive: gameActive,
                currentPlayer: currentPlayer,
                yourPlayer: yourPlayer,
                startTime: startTime,
                gameId: gameId || Date.now().toString(),
                gameWon: gameWon
            };
            localStorage.setItem('gridColoringGame', JSON.stringify(gameState));
        }

        // Create confetti effect
        function createConfetti() {
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#1abc9c'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }

        // Play box fill sound
        function playFillSound() {
            if (!soundEnabled) return;
            
            try {
                // Create a simple beep sound for filling box
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = currentPlayer === 'player1' ? 440 : 550; // Different pitch for each player
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {
                console.log("Could not play fill sound:", e);
            }
        }

        // Play win sound
        function playWinSound() {
            if (!soundEnabled) return;
            
            try {
                const winSound = new Audio('win-number-game.mp3');
                winSound.volume = 0.7;
                winSound.loop = true; // Loop the win sound
                winSound.play();
                
                winSoundPlaying = true;
                
                // Show stop win sound button
                const stopBtn = document.getElementById('stop-win-sound');
                if (stopBtn) {
                    stopBtn.style.display = 'flex';
                }
                
                // Store reference to stop it later
                window.currentWinSound = winSound;
            } catch (e) {
                console.log("Could not play win sound:", e);
            }
        }

        // Stop all sounds
        function stopAllSounds() {
            // Stop win sound if playing
            if (window.currentWinSound) {
                window.currentWinSound.pause();
                window.currentWinSound.currentTime = 0;
                winSoundPlaying = false;
            }
            
            // Hide stop button
            const stopBtn = document.getElementById('stop-win-sound');
            if (stopBtn) {
                stopBtn.style.display = 'none';
            }
        }

        // Update timer display
        function updateTimer() {
            if (!startTime) return;
            
            const now = new Date();
            const elapsed = new Date(now - startTime);
            const minutes = elapsed.getUTCMinutes().toString().padStart(2, '0');
            const seconds = elapsed.getUTCSeconds().toString().padStart(2, '0');
            
            timerDisplay.textContent = `Time: ${minutes}:${seconds}`;
        }

        // Start the timer
        function startTimer() {
            if (!startTime) {
                startTime = new Date();
            }
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        // Stop the timer
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // Check for completed lines (5 in a row)
        function checkForCompletedLines() {
            const cells = Array.from(grid.children);
            let linesFound = 0;
            
            // Create 5x5 matrix
            const matrix = [];
            for (let i = 0; i < 5; i++) {
                matrix[i] = [];
                for (let j = 0; j < 5; j++) {
                    const cell = cells[i * 5 + j];
                    if (cell.classList.contains('player1')) {
                        matrix[i][j] = 1;
                    } else if (cell.classList.contains('player2')) {
                        matrix[i][j] = 2;
                    } else {
                        matrix[i][j] = 0;
                    }
                }
            }
            
            // Check all possible lines
            const allLines = [
                // Rows
                {type: 'row', cells: [0,1,2,3,4], index: 0},
                {type: 'row', cells: [5,6,7,8,9], index: 1},
                {type: 'row', cells: [10,11,12,13,14], index: 2},
                {type: 'row', cells: [15,16,17,18,19], index: 3},
                {type: 'row', cells: [20,21,22,23,24], index: 4},
                
                // Columns
                {type: 'col', cells: [0,5,10,15,20], index: 0},
                {type: 'col', cells: [1,6,11,16,21], index: 1},
                {type: 'col', cells: [2,7,12,17,22], index: 2},
                {type: 'col', cells: [3,8,13,18,23], index: 3},
                {type: 'col', cells: [4,9,14,19,24], index: 4},
                
                // Diagonals
                {type: 'diag1', cells: [0,6,12,18,24], index: 0},
                {type: 'diag2', cells: [4,8,12,16,20], index: 1}
            ];
            
            allLines.forEach(line => {
                const lineId = `${line.type}_${line.index}`;
                
                // Skip if already counted
                if (completedLines.includes(lineId)) return;
                
                // Check if all cells in line are filled (any player)
                let allFilled = true;
                let playerCounts = {player1: 0, player2: 0};
                
                line.cells.forEach(cellIndex => {
                    const cell = cells[cellIndex];
                    if (cell.classList.contains('player1')) {
                        playerCounts.player1++;
                    } else if (cell.classList.contains('player2')) {
                        playerCounts.player2++;
                    } else {
                        allFilled = false;
                    }
                });
                
                if (allFilled) {
                    completedLines.push(lineId);
                    linesFound++;
                    
                    // Highlight the cells (but don't draw lines)
                    highlightLineCells(line.cells);
                    
                    // Show score popup
                    showScorePopup(line.cells[0], '+1');
                }
            });
            
            return linesFound;
        }

        // Highlight cells in a completed line
        function highlightLineCells(cellIndices) {
            const cells = Array.from(grid.children);
            
            cellIndices.forEach(cellIndex => {
                const cell = cells[cellIndex];
                if (cell) {
                    cell.classList.add('completed-line-cell');
                }
            });
        }

        // Show score popup animation
        function showScorePopup(cellIndex, text) {
            const cells = Array.from(grid.children);
            const cell = cells[cellIndex];
            
            if (cell) {
                const rect = cell.getBoundingClientRect();
                const popup = document.createElement('div');
                popup.className = 'score-popup';
                popup.textContent = text;
                popup.style.left = `${rect.left + rect.width/2}px`;
                popup.style.top = `${rect.top}px`;
                
                document.body.appendChild(popup);
                
                setTimeout(() => {
                    popup.remove();
                }, 1000);
            }
        }

        // Check for winner (when score reaches 5)
        function checkForWinner() {
            if (score >= 5 && !gameWon) {
                gameWon = true;
                gameActive = false;
                stopTimer();
                
                gameStatus.textContent = `🎉 ${playerName} Wins! Score: ${score} 🎉`;
                createConfetti();
                playWinSound();
                
                setTimeout(() => {
                    localStorage.removeItem('gridColoringGame');
                }, 1000);
                
                return true;
            }
            return false;
        }

        // Render the grid based on current state
        function renderGrid() {
            grid.innerHTML = '';
            
            numbers.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = num;
                cell.dataset.number = num;
                cell.draggable = !gameActive;
                
                if (markedCells[num]) {
                    cell.classList.add(markedCells[num]);
                }
                
                cell.addEventListener('dragstart', handleDragStart);
                cell.addEventListener('dragover', handleDragOver);
                cell.addEventListener('drop', handleDrop);
                cell.addEventListener('dragend', handleDragEnd);
                
                cell.addEventListener('click', function() {
                    if (gameActive && currentPlayer && !markedCells[num] && !gameWon) {
                        // Play fill sound
                        playFillSound();
                        
                        cell.classList.add(currentPlayer, 'marked');
                        markedCells[num] = currentPlayer;
                        
                        // Check for completed lines
                        const linesFound = checkForCompletedLines();
                        
                        if (linesFound > 0 && score < 5) {
                            // Increase score by number of lines found (max 5)
                            const newScore = score + linesFound;
                            score = Math.min(newScore, 5); // Cap at 5
                            updateScore();
                            
                            // Show message
                            gameStatus.textContent = `${playerName} completed ${linesFound} line(s)! +${linesFound} point(s)`;
                            
                            // Check for winner
                            if (checkForWinner()) {
                                return;
                            }
                        }
                        
                        // Switch turns (alternate between player1 and player2)
                        // This simulates two players on different devices
                        currentPlayer = currentPlayer === 'player1' ? 'player2' : 'player1';
                        updateTurnDisplay();
                        saveGameState();
                        
                        // Check if all cells are marked
                        const totalMarked = Object.keys(markedCells).length;
                        if (totalMarked === 25 && score < 5) {
                            gameStatus.textContent = "All boxes filled! Continue playing until you reach 5 points.";
                        }
                    }
                });
                
                grid.appendChild(cell);
            });
            
            // Redraw any completed line highlights
            redrawCompletedLines();
        }

        // Redraw completed line highlights
        function redrawCompletedLines() {
            // Clear existing highlights
            document.querySelectorAll('.completed-line-cell').forEach(cell => {
                cell.classList.remove('completed-line-cell');
            });
            
            if (completedLines.length === 0) return;
            
            const cells = Array.from(grid.children);
            const allLines = [
                {type: 'row', cells: [0,1,2,3,4], index: 0},
                {type: 'row', cells: [5,6,7,8,9], index: 1},
                {type: 'row', cells: [10,11,12,13,14], index: 2},
                {type: 'row', cells: [15,16,17,18,19], index: 3},
                {type: 'row', cells: [20,21,22,23,24], index: 4},
                {type: 'col', cells: [0,5,10,15,20], index: 0},
                {type: 'col', cells: [1,6,11,16,21], index: 1},
                {type: 'col', cells: [2,7,12,17,22], index: 2},
                {type: 'col', cells: [3,8,13,18,23], index: 3},
                {type: 'col', cells: [4,9,14,19,24], index: 4},
                {type: 'diag1', cells: [0,6,12,18,24], index: 0},
                {type: 'diag2', cells: [4,8,12,16,20], index: 1}
            ];
            
            completedLines.forEach(lineId => {
                const [type, index] = lineId.split('_');
                const lineIndex = parseInt(index);
                
                const lineInfo = allLines.find(line => 
                    line.type === type && line.index === lineIndex
                );
                
                if (lineInfo) {
                    highlightLineCells(lineInfo.cells);
                }
            });
        }

        function initGame() {
            gameId = Date.now().toString();
            numbers = Array.from({length: 25}, (_, i) => i + 1);
            markedCells = {};
            score = 0;
            gameWon = false;
            completedLines = [];
            gameStarted = false;
            gameActive = false;
            currentPlayer = null;
            yourPlayer = null;
            startTime = null;
            stopTimer();
            timerDisplay.textContent = 'Time: 00:00';
            
            // Reset sound
            soundEnabled = true;
            winSoundPlaying = false;
            stopAllSounds();
            
            // Update sound button
            const soundBtn = document.getElementById('toggle-sound');
            if (soundBtn) {
                soundBtn.classList.remove('muted');
                soundBtn.innerHTML = '🔊<span class="tooltiptext">Sound On</span>';
            }
            
            // Hide stop win sound button
            const stopBtn = document.getElementById('stop-win-sound');
            if (stopBtn) {
                stopBtn.style.display = 'none';
            }
            
            renderGrid();
            updateScore();
            updateTurnDisplay();
            
            startBtn.style.display = 'inline-block';
            yourPlayerBtn.style.display = 'none';
            gameStatus.textContent = 'Click "Start Game" to begin';
            dragEnabled = true;
            
            saveGameState();
        }

        function updateTurnDisplay() {
            if (!gameActive || gameWon) return;
            
            const opponentText = currentPlayer === 'player1' ? " (Your turn)" : " (Opponent's turn)";
            gameStatus.textContent = `${playerName}${opponentText} - Make lines of 5`;
            
            // Update score display color based on current player
            scoreDisplay.style.backgroundColor = currentPlayer === 'player1' ? 
                'var(--player1-color)' : 'var(--player2-color)';
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            saveGameState();
        }

        function handleDragStart(e) {
            if (!dragEnabled || gameWon) return;
            draggedCell = e.target;
            e.dataTransfer.setData('text/plain', e.target.dataset.number);
            setTimeout(() => e.target.style.opacity = '0.4', 0);
        }

        function handleDragOver(e) {
            if (!dragEnabled || gameWon) return;
            e.preventDefault();
        }

        function handleDrop(e) {
            if (!dragEnabled || gameWon) return;
            e.preventDefault();
            if (e.target.classList.contains('cell')) {
                const tempNum = draggedCell.dataset.number;
                const tempText = draggedCell.textContent;
                
                draggedCell.dataset.number = e.target.dataset.number;
                draggedCell.textContent = e.target.textContent;
                
                e.target.dataset.number = tempNum;
                e.target.textContent = tempText;
                
                saveGameState();
            }
        }

        function handleDragEnd(e) {
            e.target.style.opacity = '1';
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function shuffleGrid() {
            if (gameStarted || gameWon) return;
            
            const cells = Array.from(grid.children);
            const currentNumbers = cells.map(cell => parseInt(cell.textContent));
            const shuffledNumbers = shuffleArray(currentNumbers);
            
            cells.forEach((cell, index) => {
                cell.textContent = shuffledNumbers[index];
                cell.dataset.number = shuffledNumbers[index];
            });
            
            saveGameState();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Event listeners
        startBtn.addEventListener('click', function() {
            showNameInput();
        });

        yourPlayerBtn.addEventListener('click', function() {
            yourPlayer = 'player1'; // You are always player1
            currentPlayer = 'player1'; // Start with player1
            
            gameStarted = true;
            gameActive = true;
            gameWon = false;
            yourPlayerBtn.style.display = 'none';
            dragEnabled = false;
            document.querySelectorAll('.cell').forEach(cell => cell.draggable = false);
            
            startTime = new Date();
            startTimer();
            updateTurnDisplay();
            saveGameState();
        });

        plusBtn.addEventListener('click', function() {
            if (gameWon) {
                gameStatus.textContent = "Game already won! Reset to play again.";
                return;
            }
            
            if (score < 5) {
                score++;
                updateScore();
                playFillSound();
                if (checkForWinner()) return;
                gameStatus.textContent = `Manual point added for ${playerName}`;
            } else {
                gameStatus.textContent = "Already at 5 points! You win!";
            }
        });

        minusBtn.addEventListener('click', function() {
            if (gameWon) {
                gameStatus.textContent = "Game already won! Reset to play again.";
                return;
            }
            
            if (score > 0) {
                score--;
                updateScore();
                playFillSound();
                gameStatus.textContent = `Manual point removed from ${playerName}`;
            }
        });

        shuffleBtn.addEventListener('click', shuffleGrid);
        
        resetBtn.addEventListener('click', function() {
            if (confirm('Are you sure you want to reset the game? All progress will be lost.')) {
                localStorage.removeItem('gridColoringGame');
                stopAllSounds();
                initGame();
            }
        });
        
        fullscreenBtn.addEventListener('click', toggleFullscreen);
