  stopWinSoundBtn.innerHTML = '⏹️<span class="tooltiptext">Stop Win Sound</span>';
  
  toggleSoundBtn.addEventListener('click', function() {
    soundEnabled = !soundEnabled;
    if (soundEnabled) {
      this.classList.remove('muted');
      this.innerHTML = '🔊<span class="tooltiptext">Sound On</span>';
    } else {

      this.innerHTML = '🔇<span class="tooltiptext">Sound Off</span>';

  stopWinSoundBtn.addEventListener('click', function() {

function showNameInput() {
  const modalHTML = `
    <div class="name-input-modal">
      <div class="name-input-box">
        <h2 style="color: #222; font-size: 28px; font-weight: 600; text-align: center; margin-bottom: 25px; letter-spacing: 0.5px;">

        </h2>
        <input type="text" id="player-name-input" class="name-input" 
               placeholder="Enter your name" maxlength="20" autofocus>
        <button id="submit-name" style="
          background: var(--primary-color);
          color: white;
          border: none;
          padding: 12px 30px;
          border-radius: 8px;
          font-size: 16px;
          cursor: pointer;
          margin-top: 10px;
          font-weight: 600;
        ">Submit Name</button>
      </div>
    </div>
  `;
  
  document.body.insertAdjacentHTML('beforeend', modalHTML);
  
  const nameInput = document.getElementById('player-name-input');
  const submitBtn = document.getElementById('submit-name');
  
  nameInput.focus();
  
  nameInput.addEventListener('keypress', function(e) {

      submitName();
    }
  });
  
  submitBtn.addEventListener('click', submitName);

    if (name) {

    } else {

function startGameAfterName() {
  gameStatus.textContent = `${playerName}, click "Your Player" to begin`;
  startBtn.style.display = 'none';
  yourPlayerBtn.style.display = 'inline-block';
  gameStarted = true;
  saveGameState();
}

function loadGameState() {
  const savedGame = localStorage.getItem('gridColoringGame');
  if (savedGame) {
    const gameState = JSON.parse(savedGame);
    
    if (confirm('Would you like to continue where you left off? Ok or Cancel')) {
      numbers = gameState.numbers;
      markedCells = gameState.markedCells;
      score = gameState.score;
      playerName = gameState.playerName || "Player";
      completedLines = gameState.completedLines || [];
      gameStarted = gameState.gameStarted;
      gameActive = gameState.gameActive;
      currentPlayer = gameState.currentPlayer;
      yourPlayer = gameState.yourPlayer;
      startTime = gameState.startTime ? new Date(gameState.startTime) : null;
      gameId = gameState.gameId || Date.now().toString();
      gameWon = gameState.gameWon || false;
      
      renderGrid();
      updateScore();
      
      if (gameStarted) {
        startBtn.style.display = 'none';
        if (!gameActive) {
          yourPlayerBtn.style.display = 'inline-block';
          gameStatus.textContent = `${playerName}, click "Your Player" to begin`;
        } else {
          yourPlayerBtn.style.display = 'none';
          dragEnabled = false;
          updateTurnDisplay();
          startTimer();
        }
      }
      
      return true;
    }
  }
  return false;
}

function saveGameState() {
  const gameState = {
    numbers: Array.from(grid.children).map(cell => parseInt(cell.textContent)),
    markedCells: markedCells,
    score: score,
    playerName: playerName,
    completedLines: completedLines,
    gameStarted: gameStarted,
    gameActive: gameActive,
    currentPlayer: currentPlayer,
    yourPlayer: yourPlayer,
    startTime: startTime,
    gameId: gameId || Date.now().toString(),
    gameWon: gameWon
  };
  localStorage.setItem('gridColoringGame', JSON.stringify(gameState));
}

function createConfetti() {
  const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#1abc9c'];
  for (let i = 0; i < 100; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + 'vw';
    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.width = Math.random() * 10 + 5 + 'px';
    confetti.style.height = confetti.style.width;
    confetti.style.animationDuration = Math.random() * 3 + 2 + 's';
    document.body.appendChild(confetti);
    
    setTimeout(() => {
      confetti.remove();
    }, 5000);
  }
}

function playFillSound() {
  if (!soundEnabled) return;
  
  try {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.frequency.value = currentPlayer === 'player1' ? 440 : 550;
    oscillator.type = 'sine';
    
    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
    
    oscillator.start(audioContext.currentTime);
    oscillator.stop(audioContext.currentTime + 0.1);
  } catch (e) {
    console.log("Could not play fill sound:", e);
  }
}

function playWinSound() {
  if (!soundEnabled) return;
  
  try {
    const winSound = new Audio('win-number-game.mp3');
    winSound.volume = 0.7;
    winSound.loop = true;
    winSound.play();
    
    winSoundPlaying = true;
    
    const stopBtn = document.getElementById('stop-win-sound');
    if (stopBtn) {
      stopBtn.style.display = 'flex';
    }
    
    window.currentWinSound = winSound;
  } catch (e) {
    console.log("Could not play win sound:", e);
  }
}

function stopAllSounds() {
  if (window.currentWinSound) {
    window.currentWinSound.pause();
    window.currentWinSound.currentTime = 0;
    winSoundPlaying = false;
  }
  
  const stopBtn = document.getElementById('stop-win-sound');
  if (stopBtn) {
    stopBtn.style.display = 'none';
  }
}

function updateTimer() {
  if (!startTime) return;
  
  const now = new Date();
  const elapsed = new Date(now - startTime);
  const minutes = elapsed.getUTCMinutes().toString().padStart(2, '0');
  const seconds = elapsed.getUTCSeconds().toString().padStart(2, '0');
  
  timerDisplay.textContent = `Time: ${minutes}:${seconds}`;
}

function startTimer() {
  if (!startTime) {
    startTime = new Date();
  }
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function checkForCompletedLines() {
  const cells = Array.from(grid.children);
  let linesFound = 0;
  
  const matrix = [];
  for (let i = 0; i < 5; i++) {
    matrix[i] = [];
    for (let j = 0; j < 5; j++) {
      const cell = cells[i * 5 + j];
      if (cell.classList.contains('player1')) {
        matrix[i][j] = 1;
      } else if (cell.classList.contains('player2')) {
        matrix[i][j] = 2;
      } else {
        matrix[i][j] = 0;
      }
    }
  }
  
  const allLines = [
    {type: 'row', cells: [0,1,2,3,4], index: 0},
    {type: 'row', cells: [5,6,7,8,9], index: 1},
    {type: 'row', cells: [10,11,12,13,14], index: 2},
    {type: 'row', cells: [15,16,17,18,19], index: 3},
    {type: 'row', cells: [20,21,22,23,24], index: 4},
    {type: 'col', cells: [0,5,10,15,20], index: 0},
    {type: 'col', cells: [1,6,11,16,21], index: 1},
    {type: 'col', cells: [2,7,12,17,22], index: 2},
    {type: 'col', cells: [3,8,13,18,23], index: 3},
    {type: 'col', cells: [4,9,14,19,24], index: 4},
    {type: 'diag1', cells: [0,6,12,18,24], index: 0},
    {type: 'diag2', cells: [4,8,12,16,20], index: 1}
  ];
  
  allLines.forEach(line => {
    const lineId = `${line.type}_${line.index}`;
    
    if (completedLines.includes(lineId)) return;
    
    let allFilled = true;
    let playerCounts = {player1: 0, player2: 0};
    
    line.cells.forEach(cellIndex => {
      const cell = cells[cellIndex];
      if (cell.classList.contains('player1')) {
        playerCounts.player1++;
      } else if (cell.classList.contains('player2')) {
        playerCounts.player2++;
      } else {
        allFilled = false;
      }
    });
    
    if (allFilled) {
      completedLines.push(lineId);
      linesFound++;
      highlightLineCells(line.cells);
      showScorePopup(line.cells[0], '+1');
    }
  });
  
  return linesFound;
}

function highlightLineCells(cellIndices) {
  const cells = Array.from(grid.children);
  
  cellIndices.forEach(cellIndex => {
    const cell = cells[cellIndex];
    if (cell) {
      cell.classList.add('completed-line-cell');
    }
  });
}

function showScorePopup(cellIndex, text) {
  const cells = Array.from(grid.children);
  const cell = cells[cellIndex];
  
  if (cell) {
    const rect = cell.getBoundingClientRect();
    const popup = document.createElement('div');
    popup.className = 'score-popup';
    popup.textContent = text;
    popup.style.left = `${rect.left + rect.width/2}px`;
    popup.style.top = `${rect.top}px`;
    
    document.body.appendChild(popup);
    
    setTimeout(() => {
      popup.remove();
    }, 1000);
  }
}

function checkForWinner() {
  if (score >= 5 && !gameWon) {
    gameWon = true;
    gameActive = false;
    stopTimer();
    
    gameStatus.textContent = `🎉 ${playerName} Wins! Score: ${score} 🎉`;
    createConfetti();
    playWinSound();
    
    setTimeout(() => {
      localStorage.removeItem('gridColoringGame');
    }, 1000);
    
    return true;
  }
  return false;
}

function renderGrid() {
  grid.innerHTML = '';
  
  numbers.forEach(num => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = num;
    cell.dataset.number = num;
    cell.draggable = !gameActive;
    
    if (markedCells[num]) {
      cell.classList.add(markedCells[num]);
    }
    
    cell.addEventListener('dragstart', handleDragStart);
    cell.addEventListener('dragover', handleDragOver);
    cell.addEventListener('drop', handleDrop);
    cell.addEventListener('dragend', handleDragEnd);
    
    cell.addEventListener('click', function() {
      if (gameActive && currentPlayer && !markedCells[num] && !gameWon) {
        playFillSound();
        
        cell.classList.add(currentPlayer, 'marked');
        markedCells[num] = currentPlayer;
        
        const linesFound = checkForCompletedLines();
        
        if (linesFound > 0 && score < 5) {
          const newScore = score + linesFound;
          score = Math.min(newScore, 5);
          updateScore();
          
          gameStatus.textContent = `${playerName} completed ${linesFound} line(s)! +${linesFound} point(s)`;
          
          if (checkForWinner()) {
            return;
          }
        }
        
        currentPlayer = currentPlayer === 'player1' ? 'player2' : 'player1';
        updateTurnDisplay();
        saveGameState();
        
        const totalMarked = Object.keys(markedCells).length;
        if (totalMarked === 25 && score < 5) {
          gameStatus.textContent = "All boxes filled! Continue playing until you reach 5 points.";
        }
      }
    });
    
    grid.appendChild(cell);
  });
  
  redrawCompletedLines();
}

function redrawCompletedLines() {
  document.querySelectorAll('.completed-line-cell').forEach(cell => {
    cell.classList.remove('completed-line-cell');
  });
  
  if (completedLines.length === 0) return;
  
  const cells = Array.from(grid.children);
  const allLines = [
    {type: 'row', cells: [0,1,2,3,4], index: 0},
    {type: 'row', cells: [5,6,7,8,9], index: 1},
    {type: 'row', cells: [10,11,12,13,14], index: 2},
    {type: 'row', cells: [15,16,17,18,19], index: 3},
    {type: 'row', cells: [20,21,22,23,24], index: 4},
    {type: 'col', cells: [0,5,10,15,20], index: 0},
    {type: 'col', cells: [1,6,11,16,21], index: 1},
    {type: 'col', cells: [2,7,12,17,22], index: 2},
    {type: 'col', cells: [3,8,13,18,23], index: 3},
    {type: 'col', cells: [4,9,14,19,24], index: 4},
    {type: 'diag1', cells: [0,6,12,18,24], index: 0},
    {type: 'diag2', cells: [4,8,12,16,20], index: 1}
  ];
  
  completedLines.forEach(lineId => {
    const [type, index] = lineId.split('_');
    const lineIndex = parseInt(index);
    
    const lineInfo = allLines.find(line => 
      line.type === type && line.index === lineIndex
    );
    
    if (lineInfo) {
      highlightLineCells(lineInfo.cells);
    }
  });
}

function initGame() {
  gameId = Date.now().toString();
  numbers = Array.from({length: 25}, (_, i) => i + 1);
  markedCells = {};
  score = 0;
  gameWon = false;
  completedLines = [];
  gameStarted = false;
  gameActive = false;
  currentPlayer = null;
  yourPlayer = null;
  startTime = null;
  stopTimer();
  timerDisplay.textContent = 'Time: 00:00';
  
  soundEnabled = true;
  winSoundPlaying = false;
  stopAllSounds();
  
  const soundBtn = document.getElementById('toggle-sound');
  if (soundBtn) {
    soundBtn.classList.remove('muted');
    soundBtn.innerHTML = '🔊<span class="tooltiptext">Sound On</span>';
  }
  
  const stopBtn = document.getElementById('stop-win-sound');
  if (stopBtn) {
    stopBtn.style.display = 'none';
  }
  
  renderGrid();
  updateScore();
  updateTurnDisplay();
  
  startBtn.style.display = 'inline-block';
  yourPlayerBtn.style.display = 'none';
  gameStatus.textContent = 'Click "Start Game" to begin';
  dragEnabled = true;
  
  saveGameState();
}

function updateTurnDisplay() {
  if (!gameActive || gameWon) return;
  
  const opponentText = currentPlayer === 'player1' ? " (Your turn)" : " (Opponent's turn)";
  gameStatus.textContent = `${playerName}${opponentText} - Make lines of 5`;
  
  scoreDisplay.style.backgroundColor = currentPlayer === 'player1' ? 
    'var(--player1-color)' : 'var(--player2-color)';
}

function updateScore() {
  scoreDisplay.textContent = score;
  saveGameState();
}

function handleDragStart(e) {
  if (!dragEnabled || gameWon) return;
  draggedCell = e.target;
  e.dataTransfer.setData('text/plain', e.target.dataset.number);
  setTimeout(() => e.target.style.opacity = '0.4', 0);
}

function handleDragOver(e) {
  if (!dragEnabled || gameWon) return;
  e.preventDefault();
}

function handleDrop(e) {
  if (!dragEnabled || gameWon) return;
  e.preventDefault();
  if (e.target.classList.contains('cell')) {
    const tempNum = draggedCell.dataset.number;
    const tempText = draggedCell.textContent;
    
    draggedCell.dataset.number = e.target.dataset.number;
    draggedCell.textContent = e.target.textContent;
    
    e.target.dataset.number = tempNum;
    e.target.textContent = tempText;
    
    saveGameState();
  }
}

function handleDragEnd(e) {
  e.target.style.opacity = '1';
}

function shuffleArray(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

function shuffleGrid() {
  if (gameStarted || gameWon) return;
  
  const cells = Array.from(grid.children);
  const currentNumbers = cells.map(cell => parseInt(cell.textContent));
  const shuffledNumbers = shuffleArray(currentNumbers);
  
  cells.forEach((cell, index) => {
    cell.textContent = shuffledNumbers[index];
    cell.dataset.number = shuffledNumbers[index];
  });
  
  saveGameState();
}

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      alert(`Error attempting to enable fullscreen: ${err.message}`);
    });
  } else {
    document.exitFullscreen();
  }
}

function setupUserSystemEvents() {
  document.getElementById('login-tab').addEventListener('click', () => {
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('login-tab').style.background = '#3498db';
    document.getElementById('register-tab').style.background = '#34495e';
    document.getElementById('login-message').textContent = '';
  });
  
  document.getElementById('register-tab').addEventListener('click', () => {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
    document.getElementById('register-tab').style.background = '#3498db';
    document.getElementById('login-tab').style.background = '#34495e';
    document.getElementById('login-message').textContent = '';
  });
  
  document.getElementById('login-submit').addEventListener('click', handleLogin);
  document.getElementById('register-submit').addEventListener('click', handleRegister);
  
  document.getElementById('login-username').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('login-password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
  
  document.getElementById('register-username').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleRegister();
  });
  document.getElementById('register-password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleRegister();
  });
  document.getElementById('register-confirm-password').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleRegister();
  });
  
  document.getElementById('register-username').addEventListener('input', debounce(checkUsername, 500));
  document.getElementById('register-password').addEventListener('input', checkPasswordStrength);
  document.getElementById('register-confirm-password').addEventListener('input', checkPasswordMatch);
  
  document.getElementById('logout-btn').addEventListener('click', handleLogout);
}

function isValidUsername(username) {
  const regex = /^[a-zA-Z0-9_]{3,15}$/;
  return regex.test(username);
}

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return hash.toString(16);
}

async function checkUsername() {
  const username = document.getElementById('register-username').value.trim();
  const feedback = document.getElementById('password-feedback');
  
  if (username.length < 3) {
    feedback.style.color = '#bdc3c7';
    feedback.textContent = 'Minimum 3 characters';
    return;
  }
  
  if (!isValidUsername(username)) {
    feedback.style.color = '#e74c3c';
    feedback.textContent = 'Invalid format. Use letters, numbers, underscore';
    return;
  }
  
  try {
    const response = await fetch(`${WORKER_URL}/api/check/${encodeURIComponent(username)}`);
    const data = await response.json();
    
    if (!data.available) {
      feedback.style.color = '#e74c3c';
      feedback.textContent = '❌ Username already taken';
    } else {
      feedback.style.color = '#2ecc71';
      feedback.textContent = '✓ Username available';
    }
  } catch (error) {
    console.error('Check error:', error);
  }
}

function checkPasswordStrength() {
  const password = document.getElementById('register-password').value;
  const feedback = document.getElementById('password-feedback');
  
  if (password.length === 0) {
    feedback.textContent = '';
  } else if (password.length < 6) {
    feedback.textContent = '❌ Too short (minimum 6 characters)';
    feedback.style.color = '#e74c3c';
  } else if (password.length >= 6 && password.length < 8) {
    feedback.textContent = '⚠️ Weak password (add more characters)';
    feedback.style.color = '#f39c12';
  } else {
    const hasLetter = /[a-zA-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    
    if (hasLetter && hasNumber && password.length >= 8) {
      feedback.textContent = '✓ Strong password';
      feedback.style.color = '#2ecc71';
    } else {
      feedback.textContent = '⚠️ Medium strength (mix letters and numbers)';
      feedback.style.color = '#f39c12';
    }
  }
}

function checkPasswordMatch() {
  const password = document.getElementById('register-password').value;
  const confirm = document.getElementById('register-confirm-password').value;
  const feedback = document.getElementById('password-feedback');
  
  if (confirm.length === 0) return;
  
  if (password !== confirm) {
    feedback.textContent = '❌ Passwords do not match';
    feedback.style.color = '#e74c3c';
  } else {
    feedback.textContent = '✓ Passwords match';
    feedback.style.color = '#2ecc71';
  }
}

async function handleRegister() {
  const username = document.getElementById('register-username').value.trim();
  const password = document.getElementById('register-password').value;
  const confirmPassword = document.getElementById('register-confirm-password').value;
  const messageEl = document.getElementById('login-message');
  
  if (!username || !password || !confirmPassword) {
    messageEl.textContent = 'Please fill all fields';
    return;
  }
  
  if (!isValidUsername(username)) {
    messageEl.textContent = 'Username must be 3-15 characters (letters, numbers, underscore)';
    return;
  }
  
  if (password.length < 6) {
    messageEl.textContent = 'Password must be at least 6 characters';
    return;
  }
  
  if (password !== confirmPassword) {
    messageEl.textContent = 'Passwords do not match';
    return;
  }
  
  try {
    const response = await fetch(`${WORKER_URL}/api/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    
    if (data.success) {
      messageEl.style.color = '#2ecc71';
      messageEl.textContent = 'Registration successful! Logging in...';
      currentUser = data.user;
      
      document.getElementById('register-username').value = '';
      document.getElementById('register-password').value = '';
      document.getElementById('register-confirm-password').value = '';
      
      hideLoginModal();
      startUserSession();
    } else {
      messageEl.style.color = '#e74c3c';
      messageEl.textContent = data.error || 'Registration failed';
    }
  } catch (error) {
    messageEl.textContent = 'Network error. Try again.';
    console.error('Register error:', error);
  }
}

async function handleLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const messageEl = document.getElementById('login-message');
  
  if (!username || !password) {
    messageEl.textContent = 'Please enter username and password';
    return;
  }
  
  try {
    const response = await fetch(`${WORKER_URL}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    
    const data = await response.json();
    
    if (data.success) {
      messageEl.style.color = '#2ecc71';
      messageEl.textContent = 'Login successful!';
      currentUser = data.user;
      
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
      
      hideLoginModal();
      startUserSession();
    } else {
      messageEl.style.color = '#e74c3c';
      messageEl.textContent = data.error || 'Invalid username or password';
      
      const modal = document.querySelector('#login-modal > div');
      modal.style.animation = 'shake 0.5s';
      setTimeout(() => {
        modal.style.animation = '';
      }, 500);
    }
  } catch (error) {
    messageEl.textContent = 'Network error. Try again.';
    console.error('Login error:', error);
  }
}

async function handleLogout() {
  if (currentUser) {
    try {
      await fetch(`${WORKER_URL}/api/status`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          username: currentUser.username, 
          status: 'offline' 
        })
      });
    } catch (error) {
      console.error('Status update error:', error);
    }
    
    currentUser = null;
    localStorage.removeItem('bingoUser');
    
    if (statusCheckInterval) {
      clearInterval(statusCheckInterval);
      statusCheckInterval = null;
    }
    
    showLoginModal();
    
    document.getElementById('user-panel').style.display = 'none';
    
    const socialPanel = document.getElementById('social-panel');
    if (socialPanel) socialPanel.style.display = 'none';
    
    const multiplayerPanel = document.getElementById('multiplayer-panel');
    if (multiplayerPanel) multiplayerPanel.style.display = 'none';
    
    const finalTabs = document.getElementById('final-tabs');
    if (finalTabs) finalTabs.style.display = 'none';
    
    gameStatus.textContent = 'Please login to play';
  }
}

function hideLoginModal() {
  document.getElementById('login-modal').style.display = 'none';
}

function showLoginModal() {
  document.getElementById('login-modal').style.display = 'flex';
  
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('register-username').value = '';
  document.getElementById('register-password').value = '';
  document.getElementById('register-confirm-password').value = '';
  document.getElementById('login-message').textContent = '';
  document.getElementById('password-feedback').textContent = '';
  
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('register-form').style.display = 'none';
  document.getElementById('login-tab').style.background = '#3498db';
  document.getElementById('register-tab').style.background = '#34495e';
}

function startUserSession() {
  const userToSave = { ...currentUser };
  delete userToSave.password;
  localStorage.setItem('bingoUser', JSON.stringify(userToSave));
  
  document.getElementById('user-welcome').textContent = `Welcome, ${currentUser.username}!`;
  document.getElementById('user-wins').textContent = currentUser.wins || 0;
  document.getElementById('user-games').textContent = currentUser.gamesPlayed || 0;
  document.getElementById('user-panel').style.display = 'block';
  
  gameStatus.textContent = `${currentUser.username}, click "Your Player" to begin`;
  
  const socialPanel = document.getElementById('social-panel');
  if (socialPanel) {
    socialPanel.style.display = 'block';
    if (typeof startSocialSystem === 'function') {
      startSocialSystem();
    }
  }
  
  const multiplayerPanel = document.getElementById('multiplayer-panel');
  if (multiplayerPanel) {
    multiplayerPanel.style.display = 'block';
    if (typeof fetchRooms === 'function') {
      fetchRooms();
    }
  }
  
  const finalTabs = document.getElementById('final-tabs');
  if (finalTabs) {
    finalTabs.style.display = 'flex';
    resetLeaderboard();
    loadLeaderboard();
  }
  
  statusCheckInterval = setInterval(() => {
    updateUserStatus();
  }, 30000);
  
  updateUserStatus();
  
  window.addEventListener('beforeunload', () => {
    if (currentUser) {
      const data = JSON.stringify({ 
        username: currentUser.username, 
        status: 'offline' 
      });
      navigator.sendBeacon(`${WORKER_URL}/api/status`, 
        new Blob([data], { type: 'application/json' })
      );
    }
  });
  
  document.dispatchEvent(new CustomEvent('userLoggedIn', { 
    detail: { username: currentUser.username } 
  }));
}

async function updateUserStatus() {
  if (!currentUser) return;
  
  try {
    await fetch(`${WORKER_URL}/api/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        username: currentUser.username, 
        status: 'online' 
      })
    });
  } catch (error) {
    console.error('Status update error:', error);
  }
}

function checkSavedSession() {
  const savedUser = localStorage.getItem('bingoUser');
  if (savedUser) {
    try {
      currentUser = JSON.parse(savedUser);
      fetch(`${WORKER_URL}/api/user/${encodeURIComponent(currentUser.username)}`)
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            currentUser = data.user;
            hideLoginModal();
            startUserSession();
          } else {
            localStorage.removeItem('bingoUser');
            showLoginModal();
          }
        })
        .catch(() => {
          hideLoginModal();
          startUserSession();
        });
    } catch (e) {
      showLoginModal();
    }
  } else {
    showLoginModal();
  }
}

async function fetchOnlineUsers() {
  if (!currentUser) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/online-users`);
    const data = await response.json();
    
    if (data.success) {
      onlineUsers = data.onlineUsers.filter(u => u.username !== currentUser.username);
      renderOnlineUsers();
      document.getElementById('online-count').textContent = onlineUsers.length;
    }
  } catch (error) {
    console.error('Error fetching online users:', error);
  }
}

async function fetchFriendRequests() {
  if (!currentUser) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/friend/requests/${encodeURIComponent(currentUser.username)}`);
    const data = await response.json();
    
    if (data.success) {
      friendRequests = data.requests;
      renderFriendRequests();
      
      const requestsCount = document.getElementById('requests-count');
      if (friendRequests.length > 0) {
        requestsCount.textContent = friendRequests.length;
        requestsCount.style.display = 'inline-block';
      } else {
        requestsCount.style.display = 'none';
      }
    }
  } catch (error) {
    console.error('Error fetching friend requests:', error);
  }
}

async function fetchFriends() {
  if (!currentUser) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/friends/${encodeURIComponent(currentUser.username)}`);
    const data = await response.json();
    
    if (data.success) {
      friends = data.friends;
      renderFriends();

async function sendFriendRequest(toUsername) {

  try {

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fromUsername: currentUser.username,
        toUsername: toUsername

    if (data.success) {

    });

function renderOnlineUsers(searchTerm = '') {

  let filteredUsers = onlineUsers;
  if (searchTerm) {
    filteredUsers = onlineUsers.filter(u => 
      u.username.toLowerCase().includes(searchTerm.toLowerCase())
    );
  }
  
  if (filteredUsers.length === 0) {
    onlineList.innerHTML = `
      <div style="text-align: center; color: #bdc3c7; padding: 20px;">
        ${searchTerm ? 'No players found' : 'No online players'}
      </div>
    `;
    return;
  }
  
  onlineList.innerHTML = filteredUsers.map(user => {
    const isFriend = friends.some(f => f.username === user.username);
    const hasPendingRequest = friendRequests.some(r => r.from === user.username);
    
    return `
      <div class="online-item" style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="online-indicator online"></span>
          <div>
            <div style="font-weight: 600; color: white;">${user.username}</div>
            <div style="font-size: 12px; color: #bdc3c7;">Wins: ${user.wins || 0}</div>
          </div>
        </div>
        <div>
          ${!isFriend && !hasPendingRequest ? `
            <button class="social-btn" onclick="sendFriendRequest('${user.username}')">
              Add Friend
            </button>
          ` : isFriend ? `
            <span style="color: #2ecc71; font-size: 12px;">✓ Friend</span>
          ` : `
            <span style="color: #f39c12; font-size: 12px;">Request Sent</span>
          `}
        </div>
      </div>
    `;
  }).join('');
}

function renderFriends() {
  const friendsList = document.getElementById('friends-list');
  if (!friendsList) return;
  
  if (friends.length === 0) {
    friendsList.innerHTML = `
      <div style="text-align: center; color: #bdc3c7; padding: 20px;">
        No friends yet. Add some from Online Players!
      </div>
    `;
    return;
  }
  
  friendsList.innerHTML = friends.map(friend => `
    <div class="friend-item" style="display: flex; align-items: center; justify-content: space-between;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <span class="online-indicator ${friend.status === 'online' ? 'online' : 'offline'}"></span>
        <div>
          <div style="font-weight: 600; color: white;">${friend.username}</div>
          <div style="font-size: 12px; color: #bdc3c7;">
            Wins: ${friend.wins || 0} • Friends since ${new Date(friend.since).toLocaleDateString()}
          </div>
        </div>
      </div>
      <button class="social-btn danger" onclick="removeFriend('${friend.username}')">
        Remove
      </button>
    </div>
  `).join('');
}

function renderFriendRequests() {
  const requestsList = document.getElementById('requests-list');
  if (!requestsList) return;
  
  if (friendRequests.length === 0) {
    requestsList.innerHTML = `
      <div style="text-align: center; color: #bdc3c7; padding: 20px;">
        No pending friend requests
      </div>
    `;
    return;
  }
  
  requestsList.innerHTML = friendRequests.map(request => `
    <div class="request-item" style="display: flex; align-items: center; justify-content: space-between;">
      <div>
        <div style="font-weight: 600; color: white;">${request.from}</div>
        <div style="font-size: 12px; color: #bdc3c7;">
          ${new Date(request.timestamp).toLocaleString()}
        </div>
      </div>
      <div style="display: flex; gap: 5px;">
        <button class="social-btn success" onclick="respondToFriendRequest('${request.from}', true)">
          Accept
        </button>
        <button class="social-btn danger" onclick="respondToFriendRequest('${request.from}', false)">
          Decline
        </button>
      </div>
    </div>
  `).join('');
}

function startSocialSystem() {
  if (!currentUser) return;
  
  document.getElementById('social-panel').style.display = 'block';
  
  fetchOnlineUsers();
  fetchFriendRequests();
  fetchFriends();
  
  if (socialUpdateInterval) clearInterval(socialUpdateInterval);
  socialUpdateInterval = setInterval(() => {
    fetchOnlineUsers();
    fetchFriendRequests();
    fetchFriends();
  }, 10000);
}

function stopSocialSystem() {
  if (socialUpdateInterval) {
    clearInterval(socialUpdateInterval);
    socialUpdateInterval = null;
  }
  document.getElementById('social-panel').style.display = 'none';
}

function setupMultiplayerEvents() {
  document.getElementById('create-room-btn').addEventListener('click', () => {
    document.getElementById('create-room-modal').style.display = 'flex';
  });
  
  document.getElementById('cancel-create-btn').addEventListener('click', () => {
    document.getElementById('create-room-modal').style.display = 'none';
  });
  
  document.getElementById('private-room').addEventListener('change', (e) => {
    document.getElementById('password-field').style.display = e.target.checked ? 'block' : 'none';
  });
  
  document.getElementById('confirm-create-btn').addEventListener('click', createRoom);
  
  document.getElementById('cancel-join-btn').addEventListener('click', () => {
    document.getElementById('join-room-modal').style.display = 'none';
  });
  
  document.getElementById('confirm-join-btn').addEventListener('click', joinRoom);
  
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.style.background = '#34495e';
        b.classList.remove('active');
      });
      this.style.background = '#3498db';
      this.classList.add('active');
      fetchRooms(this.dataset.filter);
    });
  });
  
  document.getElementById('search-rooms').addEventListener('input', debounce(() => {
    const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'waiting';
    fetchRooms(activeFilter);
  }, 300));
  
  document.getElementById('leave-room-btn').addEventListener('click', leaveRoom);
  document.getElementById('ready-btn').addEventListener('click', toggleReady);
  document.getElementById('start-game-btn').addEventListener('click', startGame);
  
  document.getElementById('join-room-code').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });
}

function generateRoomCode() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let code = '';
  for (let i = 0; i < 6; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
}

async function fetchRooms(status = 'waiting') {
  if (!currentUser) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/list?status=${status}`);
    const data = await response.json();
    
    if (data.success) {
      availableRooms = data.rooms;
      renderRooms();
    }
  } catch (error) {
    console.error('Error fetching rooms:', error);
  }
}

async function createRoom() {
  if (!currentUser) {
    alert('Please login first');
    return;
  }
  
  const roomName = document.getElementById('room-name-input').value.trim() || `${currentUser.username}'s Room`;
  const maxPlayers = parseInt(document.getElementById('max-players').value);
  const isPrivate = document.getElementById('private-room').checked;
  const password = document.getElementById('room-password').value;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: currentUser.username,
        roomName,
        maxPlayers,
        isPrivate,
        password: isPrivate ? password : null
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      document.getElementById('create-room-modal').style.display = 'none';
      currentRoom = data.room;
      enterRoomView();
      startRoomUpdates();
    } else {
      alert(data.error || 'Failed to create room');
    }
  } catch (error) {
    console.error('Error creating room:', error);
    alert('Network error. Try again.');
  }
}

async function joinRoom() {
  if (!currentUser) {
    alert('Please login first');
    return;
  }
  
  const roomId = document.getElementById('join-room-code').value.trim();
  const password = document.getElementById('join-password').value;
  
  if (!roomId) {
    document.getElementById('join-error').textContent = 'Please enter room code';
    return;
  }
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/join`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: currentUser.username,
        roomId,
        password
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      document.getElementById('join-room-modal').style.display = 'none';
      currentRoom = data.room;
      enterRoomView();
      startRoomUpdates();
    } else {
      document.getElementById('join-error').textContent = data.error || 'Failed to join room';
    }
  } catch (error) {
    console.error('Error joining room:', error);
    document.getElementById('join-error').textContent = 'Network error. Try again.';
  }
}

async function leaveRoom() {
  if (!currentUser || !currentRoom) return;
  
  if (!confirm('Leave this room?')) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/leave`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: currentUser.username,
        roomId: currentRoom.roomId
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      stopRoomUpdates();
      currentRoom = null;
      exitRoomView();
      fetchRooms();
    }
  } catch (error) {
    console.error('Error leaving room:', error);
  }
}

  if (!currentUser || !currentRoom) return;
  
  const currentReady = currentRoom.players[currentUser.username]?.ready || false;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/ready`, {

      body: JSON.stringify({
        username: currentUser.username,
        roomId: currentRoom.roomId,
        ready: !currentReady
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      // Room update will refresh via interval
    }
  } catch (error) {
    console.error('Error toggling ready:', error);
  }
}

async function startGame() {
  if (!currentUser || !currentRoom) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: currentUser.username,
        roomId: currentRoom.roomId
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      updateGameGrid(data.gameState.numbers);
    } else {
      alert(data.error || 'Failed to start game');
    }
  } catch (error) {
    console.error('Error starting game:', error);
  }
}

async function makeMove(number) {
  if (!currentUser || !currentRoom) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/move`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: currentUser.username,
        roomId: currentRoom.roomId,
        number
      })
    });
    
    const data = await response.json();
    
    if (!data.success) {
      alert(data.error || 'Invalid move');
    }
  } catch (error) {
    console.error('Error making move:', error);
  }
}

async function fetchRoomState() {
  if (!currentRoom) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/rooms/${currentRoom.roomId}`);
    const data = await response.json();
    
    if (data.success) {
      currentRoom = data.room;
      updateRoomView();
      
      if (currentRoom.status === 'playing') {
        updateGameGrid(currentRoom.gameState.numbers);
        highlightMarkedCells(currentRoom.gameState.markedCells);
        
        if (currentRoom.gameState.currentTurn === currentUser.username) {
          gameStatus.textContent = 'Your turn!';
        } else {
          gameStatus.textContent = `${currentRoom.gameState.currentTurn}'s turn`;
        }
      }
      
      if (currentRoom.status === 'finished' && currentRoom.gameState.winner) {
        gameStatus.textContent = `🎉 ${currentRoom.gameState.winner} wins! 🎉`;
        createConfetti();
      }
    }
  } catch (error) {
    console.error('Error fetching room state:', error);
  }
}

function renderRooms() {
  const roomsList = document.getElementById('rooms-list');
  const searchTerm = document.getElementById('search-rooms').value.toLowerCase();
  
  let filteredRooms = availableRooms;
  if (searchTerm) {
    filteredRooms = availableRooms.filter(room => 
      room.roomName.toLowerCase().includes(searchTerm) ||
      room.roomId.toLowerCase().includes(searchTerm) ||
      room.host.toLowerCase().includes(searchTerm)
    );
  }
  
  if (filteredRooms.length === 0) {
    roomsList.innerHTML = `
      <div style="text-align: center; color: #bdc3c7; padding: 30px;">
        No rooms found
      </div>
    `;
    return;
  }
  
  roomsList.innerHTML = filteredRooms.map(room => `
    <div class="room-item" onclick="joinRoomById('${room.roomId}')">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <div style="font-weight: 600; color: white;">${room.roomName}</div>
          <div style="font-size: 12px; color: #bdc3c7;">
            Host: ${room.host} • Code: ${room.roomId}
          </div>
        </div>
        <div style="text-align: right;">
          <div style="color: #3498db; font-weight: 600;">
            ${room.playerCount}/${room.maxPlayers}
          </div>
          ${room.isPrivate ? '<span style="color: #f39c12;">🔒</span>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function enterRoomView() {
  document.getElementById('lobby-view').style.display = 'none';
  document.getElementById('room-view').style.display = 'block';
  document.getElementById('multiplayer-panel').style.display = 'block';
  updateRoomView();
}

function exitRoomView() {
  document.getElementById('lobby-view').style.display = 'block';
  document.getElementById('room-view').style.display = 'none';
}

function updateRoomView() {
  if (!currentRoom) return;
  
  document.getElementById('room-name').textContent = currentRoom.roomName;
  document.getElementById('room-code').textContent = currentRoom.roomId;
  
  const playersList = document.getElementById('players-list');
  const players = Object.values(currentRoom.players || {});
  
  playersList.innerHTML = players.map(player => {
    const isHost = player.username === currentRoom.host;
    const isMe = player.username === currentUser?.username;
    
    return `
      <div class="player-item ${isHost ? 'host' : ''}" style="
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: ${isMe ? 'rgba(52, 152, 219, 0.2)' : 'rgba(0,0,0,0.2)'};
      ">
        <div style="display: flex; align-items: center; gap: 10px;">
          <span style="color: ${isHost ? '#f1c40f' : 'white'};">
            ${isHost ? '👑' : '👤'}
          </span>
          <div>
            <span style="color: white; font-weight: ${isMe ? '600' : 'normal'};">
              ${player.username} ${isMe ? '(You)' : ''}
            </span>
            <div style="font-size: 11px; color: #bdc3c7;">
              Score: ${player.score || 0}
            </div>
          </div>
        </div>
        <div>
          <span class="ready-badge ${player.ready ? 'ready' : 'not-ready'}">
            ${player.ready ? '✓ Ready' : 'Not Ready'}
          </span>
        </div>
      </div>
    `;
  }).join('');
  
  const isHost = currentRoom.host === currentUser?.username;
  document.getElementById('host-controls').style.display = isHost && currentRoom.status === 'waiting' ? 'block' : 'none';
  
  const myPlayer = currentRoom.players[currentUser?.username];
  if (myPlayer) {

  if (!grid) return;
  
  const cells = grid.children;
  for (let i = 0; i < cells.length; i++) {
    cells[i].textContent = numbers[i];
    cells[i].dataset.number = numbers[i];
    
    cells[i].onclick = function() {
      if (currentRoom?.status === 'playing' && 
          currentRoom.gameState?.currentTurn === currentUser?.username &&
          !currentRoom.gameState?.markedCells[this.dataset.number]) {
        makeMove(parseInt(this.dataset.number));
      }
    };
  }

function highlightMarkedCells(markedCells) {
  if (!grid) return;
  
  Array.from(grid.children).forEach(cell => {
    cell.classList.remove('player1', 'player2');
  });
  
  Object.entries(markedCells).forEach(([num, player]) => {
    const cells = Array.from(grid.children);
    const cell = cells.find(c => c.dataset.number === num);
    if (cell) {
      cell.classList.add(player);
    }
  });
}

function stopRoomUpdates() {

function joinRoomById(roomId) {
  const room = availableRooms.find(r => r.roomId === roomId);
  if (!room) return;
  
  if (room.isPrivate) {
    document.getElementById('join-room-code').value = roomId;
    document.getElementById('join-password-field').style.display = 'block';
    document.getElementById('join-room-modal').style.display = 'flex';

  if (!currentRoom) {
    alert('Join a room first');

  const input = document.getElementById('chat-input');

  if (!message) return;
  
  try {
    const response = await fetch(`${WORKER_URL}/api/chat/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomId: currentRoom.roomId,

        message: message

    if (data.success) {

    }
  } catch (error) {

  }

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatTime(timestamp) {
  const date = new Date(timestamp);
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(timestamp) {
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;
  
  if (diff < 86400000) {
    return 'Today';
  } else if (diff < 172800000) {
    return 'Yesterday';
  } else {
    return date.toLocaleDateString();
  }
}

function formatDuration(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function viewOpponentProfile(username) {

    }
  }, 500);
}

// ===========================================
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

    saveGameState();
  });

  plusBtn.addEventListener('click', function() {
    if (!currentUser) {
      showLoginModal();
      return;
    }
    if (gameWon) {
      gameStatus.textContent = "Game already won! Reset to play again.";
      return;
    }
    
    if (score < 5) {
      score++;
      updateScore();
      playFillSound();
      if (checkForWinner()) return;
      gameStatus.textContent = `Manual point added for ${playerName}`;
    } else {
      gameStatus.textContent = "Already at 5 points! You win!";
    }
  });

  minusBtn.addEventListener('click', function() {
    if (!currentUser) {
      showLoginModal();
      return;
    }
    if (gameWon) {
      gameStatus.textContent = "Game already won! Reset to play again.";
      return;
    }
    
    if (score > 0) {
      score--;
      updateScore();
      playFillSound();
      gameStatus.textContent = `Manual point removed from ${playerName}`;
    }
  });

  shuffleBtn.addEventListener('click', function() {
    if (!currentUser) {
      showLoginModal();
      return;
    }
    shuffleGrid();
  });
  
  resetBtn.addEventListener('click', function() {
    if (!currentUser) {
      showLoginModal();
      return;
    }
    if (confirm('Are you sure you want to reset the game? All progress will be lost.')) {
      localStorage.removeItem('gridColoringGame');
      stopAllSounds();
      initGame();
    }
  });
  
  fullscreenBtn.addEventListener('click', toggleFullscreen);

  // Save game state before page unload
  window.addEventListener('beforeunload', function(e) {
    if (gameActive && !gameWon) {
      saveGameState();
      e.preventDefault();
      e.returnValue = '';
    }
  });
  
  // Override checkForWinner to save match history
  const originalCheckForWinner = checkForWinner;
  window.checkForWinner = function() {
    const result = originalCheckForWinner();
    if (result && currentRoom) {
      saveMatchToHistory(currentUser?.username, {
        [currentUser?.username]: score,
        [Object.keys(currentRoom.players).find(p => p !== currentUser?.username)]: 
          currentRoom.players[Object.keys(currentRoom.players).find(p => p !== currentUser?.username)]?.score || 0
      });
      
      sendSystemMessage(currentRoom.roomId, `${currentUser?.username} wins the game! 🎉`);
    }
    return result;
  };
});

// Make functions globally available
window.sendFriendRequest = sendFriendRequest;
window.respondToFriendRequest = respondToFriendRequest;
window.removeFriend = removeFriend;
window.joinRoomById = joinRoomById;
window.viewOpponentProfile = viewOpponentProfile;
</script>

</body>
</html>
